<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bg)"/>

  <!-- Decorative grid dots -->
  <g fill="#38bdf8" opacity="0.08">
    <circle cx="40" cy="40" r="1.5"/><circle cx="80" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/>
    <circle cx="40" cy="80" r="1.5"/><circle cx="80" cy="80" r="1.5"/><circle cx="120" cy="80" r="1.5"/>
    <circle cx="40" cy="120" r="1.5"/><circle cx="80" cy="120" r="1.5"/><circle cx="120" cy="120" r="1.5"/>
    <circle cx="680" cy="200" r="1.5"/><circle cx="720" cy="200" r="1.5"/><circle cx="760" cy="200" r="1.5"/>
    <circle cx="680" cy="240" r="1.5"/><circle cx="720" cy="240" r="1.5"/><circle cx="760" cy="240" r="1.5"/>
    <circle cx="680" cy="280" r="1.5"/><circle cx="720" cy="280" r="1.5"/><circle cx="760" cy="280" r="1.5"/>
  </g>

  <!-- Glow line connecting left to right -->
  <rect x="200" y="148" width="400" height="4" fill="url(#glow)" rx="2"/>

  <!-- Left: Markdown document -->
  <g transform="translate(80, 70)">
    <!-- Document shadow -->
    <rect x="8" y="8" width="130" height="170" rx="8" fill="#000" opacity="0.3" filter="url(#blur)"/>
    <!-- Document body -->
    <rect x="0" y="0" width="130" height="170" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <!-- Corner fold -->
    <path d="M 102 0 L 130 0 L 130 28 Z" fill="#334155"/>
    <!-- Markdown content lines -->
    <rect x="16" y="24" width="60" height="8" rx="2" fill="#38bdf8" opacity="0.9"/>
    <rect x="16" y="44" width="90" height="4" rx="1" fill="#94a3b8" opacity="0.6"/>
    <rect x="16" y="56" width="80" height="4" rx="1" fill="#94a3b8" opacity="0.6"/>
    <rect x="16" y="68" width="70" height="4" rx="1" fill="#94a3b8" opacity="0.5"/>
    <!-- Code block indicator -->
    <rect x="16" y="88" width="98" height="36" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <rect x="24" y="96" width="50" height="3" rx="1" fill="#a78bfa" opacity="0.7"/>
    <rect x="24" y="104" width="70" height="3" rx="1" fill="#a78bfa" opacity="0.5"/>
    <rect x="24" y="112" width="40" height="3" rx="1" fill="#a78bfa" opacity="0.6"/>
    <!-- List indicator -->
    <rect x="16" y="136" width="4" height="4" rx="1" fill="#34d399"/>
    <rect x="28" y="136" width="60" height="3" rx="1" fill="#94a3b8" opacity="0.5"/>
    <rect x="16" y="146" width="4" height="4" rx="1" fill="#34d399"/>
    <rect x="28" y="146" width="50" height="3" rx="1" fill="#94a3b8" opacity="0.4"/>
  </g>

  <!-- Center: Arrow / transformation indicator -->
  <g transform="translate(360, 130)">
    <!-- Orbit rings -->
    <ellipse cx="40" cy="20" rx="50" ry="20" fill="none" stroke="#38bdf8" stroke-width="0.5" opacity="0.3" transform="rotate(-15 40 20)"/>
    <ellipse cx="40" cy="20" rx="35" ry="14" fill="none" stroke="#38bdf8" stroke-width="0.5" opacity="0.4" transform="rotate(10 40 20)"/>
    <!-- Center arrow -->
    <path d="M 20 20 L 55 20 M 45 12 L 55 20 L 45 28" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Particles -->
    <circle cx="10" cy="10" r="2" fill="#38bdf8" opacity="0.8"/>
    <circle cx="70" cy="30" r="1.5" fill="#a78bfa" opacity="0.7"/>
    <circle cx="5" cy="28" r="1" fill="#34d399" opacity="0.6"/>
    <circle cx="75" cy="8" r="1.2" fill="#f472b6" opacity="0.5"/>
  </g>

  <!-- Right: Slide cards -->
  <!-- Back card -->
  <g transform="translate(530, 55)">
    <rect x="12" y="12" width="160" height="110" rx="6" fill="#000" opacity="0.2" filter="url(#blur)"/>
    <rect x="0" y="0" width="160" height="110" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="12" y="12" width="80" height="6" rx="2" fill="#a78bfa" opacity="0.5"/>
    <rect x="12" y="26" width="120" height="3" rx="1" fill="#94a3b8" opacity="0.3"/>
    <rect x="12" y="34" width="100" height="3" rx="1" fill="#94a3b8" opacity="0.25"/>
    <rect x="12" y="50" width="136" height="20" rx="2" fill="#0f172a" opacity="0.5"/>
    <rect x="18" y="56" width="60" height="2" rx="1" fill="#38bdf8" opacity="0.3"/>
    <rect x="18" y="62" width="80" height="2" rx="1" fill="#38bdf8" opacity="0.2"/>
  </g>

  <!-- Middle card -->
  <g transform="translate(560, 80)">
    <rect x="8" y="8" width="160" height="110" rx="6" fill="#000" opacity="0.25" filter="url(#blur)"/>
    <rect x="0" y="0" width="160" height="110" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <rect x="12" y="12" width="90" height="7" rx="2" fill="#38bdf8" opacity="0.7"/>
    <rect x="12" y="28" width="130" height="4" rx="1" fill="#94a3b8" opacity="0.4"/>
    <rect x="12" y="38" width="110" height="4" rx="1" fill="#94a3b8" opacity="0.35"/>
    <rect x="12" y="56" width="136" height="24" rx="3" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <rect x="20" y="64" width="70" height="3" rx="1" fill="#a78bfa" opacity="0.4"/>
    <rect x="20" y="72" width="90" height="3" rx="1" fill="#a78bfa" opacity="0.3"/>
    <circle cx="148" cy="92" r="6" fill="#34d399" opacity="0.6"/>
  </g>

  <!-- Front card (main) -->
  <g transform="translate(590, 105)">
    <rect x="4" y="4" width="160" height="110" rx="6" fill="#000" opacity="0.35" filter="url(#blur)"/>
    <rect x="0" y="0" width="160" height="110" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
    <!-- Slide header bar -->
    <rect x="0" y="0" width="160" height="6" rx="3" fill="#38bdf8" opacity="0.8"/>
    <rect x="0" y="0" width="160" height="6" rx="3" fill="url(#glow)"/>
    <rect x="12" y="18" width="100" height="8" rx="2" fill="#f8fafc" opacity="0.9"/>
    <rect x="12" y="36" width="136" height="4" rx="1" fill="#94a3b8" opacity="0.5"/>
    <rect x="12" y="46" width="120" height="4" rx="1" fill="#94a3b8" opacity="0.45"/>
    <rect x="12" y="56" width="90" height="4" rx="1" fill="#94a3b8" opacity="0.4"/>
    <!-- Bullet points -->
    <circle cx="18" cy="78" r="3" fill="#38bdf8"/>
    <rect x="28" y="76" width="80" height="3" rx="1" fill="#cbd5e1" opacity="0.6"/>
    <circle cx="18" cy="92" r="3" fill="#34d399"/>
    <rect x="28" y="90" width="70" height="3" rx="1" fill="#cbd5e1" opacity="0.5"/>
    <!-- Slide number -->
    <rect x="136" y="96" width="18" height="8" rx="3" fill="#38bdf8" opacity="0.15"/>
    <rect x="138" y="98" width="14" height="4" rx="1" fill="#38bdf8" opacity="0.5"/>
  </g>

  <!-- Bottom text: slidown rendered with paths -->
  <!-- s -->
  <path d="M 348 250 C 348 244, 352 240, 360 240 C 368 240, 372 244, 372 248 C 372 252, 368 254, 360 256 C 352 258, 348 262, 348 268 C 348 274, 354 278, 362 278 C 368 278, 372 276, 374 274 L 372 270 C 370 272, 366 274, 362 274 C 356 274, 352 272, 352 268 C 352 264, 356 262, 364 260 C 372 258, 376 254, 376 248 C 376 242, 370 236, 360 236 C 350 236, 344 242, 344 248 Z" fill="#f8fafc"/>
  <!-- l -->
  <path d="M 382 236 L 386 236 L 386 278 L 382 278 Z" fill="#f8fafc"/>
  <!-- i -->
  <path d="M 392 236 L 396 236 L 396 240 L 392 240 Z M 392 248 L 396 248 L 396 278 L 392 278 Z" fill="#f8fafc"/>
  <!-- d -->
  <path d="M 414 236 L 418 236 L 418 254 C 420 252, 424 250, 428 250 C 436 250, 442 256, 442 264 C 442 272, 436 278, 428 278 C 424 278, 420 276, 418 274 L 418 278 L 414 278 Z M 428 254 C 422 254, 418 258, 418 264 C 418 270, 422 274, 428 274 C 434 274, 438 270, 438 264 C 438 258, 434 254, 428 254 Z" fill="#f8fafc"/>
  <!-- o -->
  <path d="M 458 250 C 448 250, 442 256, 442 264 C 442 272, 448 278, 458 278 C 468 278, 474 272, 474 264 C 474 256, 468 250, 458 250 Z M 458 254 C 464 254, 470 258, 470 264 C 470 270, 464 274, 458 274 C 452 274, 446 270, 446 264 C 446 258, 452 254, 458 254 Z" fill="#f8fafc"/>
  <!-- w -->
  <path d="M 480 248 L 484 248 L 488 270 L 492 248 L 496 248 L 500 270 L 504 248 L 508 248 L 502 278 L 498 278 L 494 256 L 490 278 L 486 278 Z" fill="#f8fafc"/>
  <!-- n -->
  <path d="M 514 248 L 518 248 L 518 254 C 520 252, 524 250, 528 250 C 534 250, 538 254, 538 260 L 538 278 L 534 278 L 534 262 C 534 256, 532 254, 528 254 C 522 254, 518 258, 518 264 L 518 278 L 514 278 Z" fill="#f8fafc"/>

  <!-- Tagline below -->
  <rect x="330" y="288" width="140" height="3" rx="1" fill="#38bdf8" opacity="0.5"/>
  <rect x="340" y="294" width="120" height="2" rx="1" fill="#94a3b8" opacity="0.3"/>
</svg>
